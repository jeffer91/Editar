# =========================================================
# Nombre completo: verify.yml
# Ruta o ubicación: /.github/workflows/verify.yml
#
# Función o funciones:
# - Verificar automáticamente cada cambio enviado a main.
# - Instalar dependencias y comprobar cada etapa por separado.
# - Conservar diagnósticos de TypeScript cuando una etapa falla.
# - Ejecutar pruebas de IPC, dominio, navegación y SQLite.
# =========================================================

name: Verificar aplicación

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, build y pruebas
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Instalar dependencias
        run: npm install

      - name: Limpiar compilaciones
        run: npm run clean

      - name: Verificar TypeScript del renderer
        run: |
          set +e
          npx tsc -p tsconfig.renderer.json --noEmit > typecheck-renderer.log 2>&1
          status=$?
          cat typecheck-renderer.log
          exit $status

      - name: Guardar diagnóstico del renderer
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-renderer-log
          path: typecheck-renderer.log
          if-no-files-found: error
          retention-days: 7

      - name: Verificar TypeScript de Electron
        run: |
          set +e
          npx tsc -p tsconfig.electron.json --noEmit > typecheck-electron.log 2>&1
          status=$?
          cat typecheck-electron.log
          exit $status

      - name: Guardar diagnóstico de Electron
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-electron-log
          path: typecheck-electron.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Compilar renderer
        run: npm run build:renderer

      - name: Compilar Electron
        run: npm run build:electron

      - name: Ejecutar pruebas automáticas
        run: npm test
