# =========================================================
# Nombre completo: verify.yml
# Ruta o ubicación: /.github/workflows/verify.yml
#
# Función o funciones:
# - Verificar automáticamente cada cambio enviado a main.
# - Instalar dependencias y comprobar cada etapa por separado.
# - Conservar diagnósticos completos cuando falle TypeScript.
# =========================================================

name: Verificar aplicación

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck y build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Limpiar compilaciones
        run: npm run clean

      - name: Verificar TypeScript del renderer
        id: renderer_typecheck
        shell: bash
        run: |
          set +e
          npx tsc -p tsconfig.renderer.json --noEmit > renderer-typecheck.log 2>&1
          status=$?
          cat renderer-typecheck.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Subir diagnóstico del renderer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renderer-typecheck
          path: renderer-typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Detener si falló el renderer
        if: steps.renderer_typecheck.outputs.status != '0'
        run: exit 1

      - name: Verificar TypeScript de Electron
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Compilar renderer
        run: npm run build:renderer

      - name: Compilar Electron
        run: npm run build:electron
